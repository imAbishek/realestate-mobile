name: Mobile CI

# Type-check gate on every push/PR (the mobile gate is tsc per AGENTS.md).
# Plus a non-blocking dependency audit (SCA) — Dependabot raises fix PRs.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Text import guard
        run: npm run check:text
      - name: Dependency audit (report-only)
        run: npm audit --audit-level=high || true
